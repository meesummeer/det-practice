<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tutor Library — DET Prep</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="topbar">
    <a href="index.html" class="logo">DET<span>Prep</span></a>
    <span class="topbar-title">Tutor Library</span>
  </header>
  <main class="page-main">
    <p class="q-sub">Roman Urdu + English explanations for every practice question. Use after wrong answers or to study ahead.</p>
    <input type="search" class="wb-search" id="tutor-search" placeholder="Search by id, type, or word…">
    <select id="tutor-type-filter" class="blank-select tutor-filter" style="width:100%;margin-bottom:12px">
      <option value="">All types</option>
    </select>
    <div id="tutor-list"></div>
  </main>
  <script src="js/shared.js"></script>
  <script src="js/questions.js"></script>
  <script src="js/tutor.js"></script>
  <script>
    const list = document.getElementById('tutor-list');
    const search = document.getElementById('tutor-search');
    const filter = document.getElementById('tutor-type-filter');
    const types = [...new Set(ACTIVE_QUESTION_BANK.map(q => q.type))].sort();
    types.forEach(t => {
      const o = document.createElement('option');
      o.value = t; o.textContent = t;
      filter.appendChild(o);
    });
    function render() {
      const q = (search.value || '').toLowerCase();
      const t = filter.value;
      list.innerHTML = ACTIVE_QUESTION_BANK
        .filter(item => (!t || item.type === t) && (
          !q || item.id.includes(q) || item.type.includes(q) ||
          (item.qtext || '').toLowerCase().includes(q) ||
          (item.explanationEN || '').toLowerCase().includes(q)
        ))
        .map(item => `
          <article class="tutor-entry">
            <h4>${escapeHtml(item.icon)} ${escapeHtml(item.tag)} <small>(${item.id})</small></h4>
            <p><strong>Correct:</strong> ${escapeHtml(Tutor.correctAnswerText(item))}</p>
            <p class="tutor-explain-en">${escapeHtml(item.explanationEN || '')}</p>
            <p class="tutor-explain-ur">${escapeHtml(item.explanationUR || '')}</p>
            <p class="tutor-memory"><strong>Memory:</strong> ${escapeHtml(item.memoryTip || '')}</p>
          </article>`).join('');
    }
    search.addEventListener('input', render);
    filter.addEventListener('change', render);
    render();
  </script>
</body>
</html>
